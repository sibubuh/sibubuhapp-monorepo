# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  pgsql:
    image: postgres:16-alpine
    container_name: tanstack_pgsql
    hostname: postgres
    restart: unless-stopped
    ports:
      - 5432:5432 # Postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Optional: only use when using custom query for preparation
      # - ./initialize.sql:/docker-entrypoint-initdb.d/initialize.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tanstackpass
      POSTGRES_DB: tanstack
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rec']
      interval: 30s
      timeout: 20s
      retries: 3

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: tanstack_pgweb
    restart: always
    ports:
      - '54321:8081'
    environment:
      PGWEB_DATABASE_URL: 'postgres://postgres:tanstackpass@pgsql:5432/tanstack?sslmode=disable'
    depends_on:
      pgsql:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    container_name: tanstack_mailpit
    restart: always
    volumes:
      - mailpit_data:/data
    ports:
      - '1025:1025' # port the SMTP server should be accessible on
      - '8025:8025' # port the web interface should be accessible on
    environment:
      # https://github.com/axllent/mailpit/wiki/Runtime-options
      TZ: 'Asia/Jakarta'

volumes:
  pg_data:
    driver: local
  mailpit_data:
    driver: local
